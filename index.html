<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis‑Style AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/design-tokens.css">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app" class="app">
    <!-- Status Bar -->
    <header class="status-bar">
      <button id="mic-toggle" class="icon-btn" aria-label="Toggle microphone">
        <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5 3h2v-2h-2v2zm0-4h2V7h-2v6z"/></svg>
        <div class="waveform-ring" aria-hidden="true"></div>
      </button>
      <span id="voice-status" class="status-label">Idle</span>
      <button id="speaker-toggle" class="icon-btn" aria-label="Toggle speaker">
        <svg class="speaker-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      </span>
      <div id="volume-meter" class="volume-meter" aria-label="Volume level"></div>
      <span class="clock" id="clock">12:34</span>
    </header>

    <!-- Main Conversation -->
    <main class="conversation">
      <svg id="memory-map" class="memory-map" aria-label="Memory map" viewBox="0 0 200 40"><circle cx="20" cy="20" r="8" fill="var(--accent-primary)"/><circle cx="60" cy="20" r="8" fill="var(--accent-primary)"/><circle cx="100" cy="20" r="8" fill="var(--accent-primary)"/><circle cx="140" cy="20" r="8" fill="var(--accent-primary)"/><circle cx="180" cy="20" r="8" fill="var(--accent-primary)"/></svg>
      <div id="chat-log" class="chat-log" aria-label="Conversation log">
        <!-- messages will be appended here -->
      </div>
    </main>

    <!-- Side Panel Stack -->
    <aside class="sidebar">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="memory">Memory</button>
        <button class="tab-btn" data-tab="sensors">Sensors</button>
        <button class="tab-btn" data-tab="permissions">Permissions</button>
      </div>
      <div class="tab-panel active" id="panel-memory">
        <input type="text" class="search-box" placeholder="Search memory…">
        <ul class="memory-list" id="memory-list">
          <!-- list items injected via JS -->
        </ul>
      </div>
      <div class="tab-panel" id="panel-sensors">
        <div class="sensor-item">
          <span class="sensor-label">Screen</span>
          <span class="sensor-indicator" id="indicator-screen" aria-label="Screen capture status">●</span>
        </div>
        <div class="sensor-item">
          <span class="sensor-label">Webcam</span>
          <span class="sensor-indicator" id="indicator-webcam" aria-label="Webcam status">●</span>
        </div>
        <div class="sensor-preview" id="sensor-preview" aria-live="polite">
          <!-- placeholder for thumbnail -->
        </div>
      </div>
      <div class="tab-panel" id="panel-permissions">
        <ul class="action-log" id="action-log">
          <!-- log items -->
        </ul>
      </div>
    </aside>

    <!-- Input Bar -->
    <footer class="input-bar">
      <button id="voice-toggle-btn" class="icon-btn" aria-label="Voice input mode">
        <svg class="voice-icon" viewBox="0 0 24 24"><path d="M12 15c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v7c0 1.66 1.34 3 3 3zm5 3h2v-2h-2v2zm0-4h2V7h-2v6z"/></svg>
      </button>
      <input type="text" id="user-input" class="input-field" placeholder="Ask Jarvis…" autocomplete="off">
      <button id="send-btn" class="icon-btn" aria-label="Send message">
        <svg class="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 5-15 5z"/></svg>
      </button>
    </footer>
  </div>

  <script src="src/script.js"></script>
</body>
</html>
